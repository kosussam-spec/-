<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>PittaExplorer_v2</title>
<style>
body{font-family:system-ui,sans-serif;margin:0;background:linear-gradient(#87ceeb,#eef9ff)}
header{text-align:center;padding:20px}
.card{background:#fff;margin:12px;border-radius:16px;padding:16px;box-shadow:0 2px 8px rgba(0,0,0,.15)}
.pitta{font-size:80px;animation:bob 2s infinite}
@keyframes bob{50%{transform:translateY(-8px)}}
button{padding:8px 12px;border-radius:10px;border:none;cursor:pointer}
.grid{display:flex;flex-wrap:wrap;gap:8px}
.badge{display:inline-block;background:#ffe082;padding:4px 8px;border-radius:20px;margin:2px}
</style>
</head>
<body>
<header>
<div class="pitta">🦜</div>
<h1>팔색조 탐험대 v2.0</h1>
<p>새를 관찰하고 동정 실력을 키워보세요!</p>
</header>

<div class="card">
<h2>탐험가 정보</h2>
<div id="lv"></div>
<progress id="bar" max="100" value="0" style="width:100%"></progress>
<div id="xp"></div>
</div>

<div class="card">
<h2>새 발견</h2>
<div class="grid" id="discover"></div>
</div>

<div class="card">
<h2>도감</h2>
<select id="birdSelect"></select>
<div id="birdInfo"></div>
</div>

<div class="card">
<h2>새 탐정 퀴즈</h2>
<div id="quiz"></div>
<button onclick="checkQuiz()">정답 확인</button>
<div id="quizResult"></div>
</div>

<div class="card">
<h2>배지</h2>
<div id="badges"></div>
</div>

<script>
const birds=[
{name:"참새",size:"작음",food:"씨앗",habitat:"도시",habit:"무리생활"},
{name:"까치",size:"중간",food:"잡식",habitat:"도시",habit:"똑똑함"},
{name:"비둘기",size:"중간",food:"곡물",habitat:"도시",habit:"무리생활"},
{name:"직박구리",size:"중간",food:"열매",habitat:"공원",habit:"활발함"},
{name:"박새",size:"작음",food:"곤충",habitat:"숲",habit:"나무 탐색"},
{name:"왜가리",size:"매우 큼",food:"물고기",habitat:"하천",habit:"혼자 사냥"},
{name:"물총새",size:"작음",food:"물고기",habitat:"하천",habit:"빠른 다이빙"},
{name:"황조롱이",size:"중간",food:"쥐",habitat:"들판",habit:"공중정지"},
{name:"수리부엉이",size:"큼",food:"작은동물",habitat:"숲",habit:"야행성"},
{name:"팔색조",size:"작음",food:"지렁이",habitat:"숲",habit:"여름철새"}
];

let state=JSON.parse(localStorage.getItem("pitta_v2")||'{"xp":0,"level":1,"found":[],"badges":[]}');
function save(){localStorage.setItem("pitta_v2",JSON.stringify(state));}

function render(){
lv.textContent="레벨 "+state.level;
xp.textContent="XP "+state.xp;
bar.value=state.xp%100;
badges.innerHTML=state.badges.map(x=>`<span class="badge">${x}</span>`).join("");
}

discover.innerHTML=birds.map(b=>`<button onclick="discoverBird('${b.name}')">${b.name}</button>`).join("");

function discoverBird(name){
 if(!state.found.includes(name)){
   state.found.push(name);
   state.xp+=20;
   if(state.found.length>=3 && !state.badges.includes("초보 탐험가")) state.badges.push("초보 탐험가");
   if(state.found.length>=5 && !state.badges.includes("조류 수집가")) state.badges.push("조류 수집가");
   while(state.xp>=state.level*100){state.level++;}
   save(); render();
 }
}

birdSelect.innerHTML=birds.map((b,i)=>`<option value="${i}">${b.name}</option>`).join("");
function showBird(){
 let b=birds[birdSelect.value];
 birdInfo.innerHTML=`
 <h3>${b.name}</h3>
 <p>📏 크기: ${b.size}</p>
 <p>🍽 먹이: ${b.food}</p>
 <p>🏠 서식지: ${b.habitat}</p>
 <p>🐦 습성: ${b.habit}</p>`;
}
birdSelect.onchange=showBird; showBird();

const q={
question:"물고기를 잡아먹고 하천 주변에 사는 새는?",
options:["참새","물총새","까치","박새"],
answer:"물총새"
};
quiz.innerHTML=`<p>${q.question}</p>`+q.options.map(o=>`<label><input type="radio" name="q" value="${o}">${o}</label><br>`).join("");

function checkQuiz(){
 let v=document.querySelector('input[name=q]:checked');
 if(!v) return;
 if(v.value===q.answer){
   quizResult.textContent="정답! +10XP";
   state.xp+=10;
 }else{
   quizResult.textContent="오답! 정답은 "+q.answer;
 }
 save(); render();
}

render();
</script>
</body>
</html>
